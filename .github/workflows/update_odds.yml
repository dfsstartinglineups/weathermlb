name: Fetch MLB Betting Odds

on:
  schedule:
    # Runs every 5 minutes, every day, 24/7.
    - cron: '*/5 * * * *'
  workflow_dispatch: 

jobs:
  update-odds:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run fetch_odds.py
        run: python fetch_odds.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/odds.json
          
          # Check if there are staged changes ready to be committed
          if ! git diff --quiet --staged; then
            git commit -m "📈 Update daily betting odds [skip ci]"
            
            # Pull latest changes and rebase BEFORE pushing
            git pull --rebase origin main || echo "Nothing to pull"
            
            # Try pushing. If rejected, pull again and immediately push.
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "No new odds updates. Skipping commit."
          fi
