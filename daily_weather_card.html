<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Bot Capture - Compact Weather Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* RESET & BOT-SPECIFIC SIZING */
        * { box-sizing: border-box; }
        body { 
            background-color: #f8f9fa; /* Light mode site background */
            color: #212529; 
            font-family: 'Montserrat', sans-serif;
            width: 1080px; 
            margin: 0;
            padding: 0;
        }
        
        /* MAIN CAPTURE WRAPPER */
        #capture-area {
            width: 1080px;
            background-color: #f8f9fa;
            padding-bottom: 40px;
        }

        /* OFFICIAL WEATHERMLB DARK NAVBAR */
        .navbar-weather {
            background-color: #0f172a;
            padding: 18px 35px;
            border-bottom: 3px solid #00e676;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand-logo {
            color: #ffffff;
            font-weight: 800;
            font-size: 2.4rem;
            font-style: italic;
            letter-spacing: 0.5px;
            text-decoration: none;
            line-height: 1;
        }
        .brand-logo span { color: #5ac8fa; }
        
        .header-date { text-align: right; line-height: 1.1; }
        .header-date .day { font-size: 1.5rem; font-weight: 800; color: #5ac8fa; }
        .header-date .full-date { font-size: 0.95rem; color: #f8f9fa; font-weight: 600; }

        /* TITLE BANNER (Park Factors Removed) */
        .title-banner {
            text-align: center;
            padding: 22px 20px 15px 20px;
        }
        .title-banner h1 {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .title-banner p {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 600;
            margin: 0;
        }

        /* 3-COLUMN COMPACT GRID */
        #games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding: 0 30px;
        }

        /* OFFICIAL SITE WEATHER BACKGROUND GRADIENTS */
        .game-card {
            border: 1px solid #dee2e6;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            transition: all 0.2s;
        }
        .bg-weather-sunny {
            background: linear-gradient(-45deg, #e3f2fd, #e1f5fe, #f1f8e9);
            background-size: 300% 300%;
        }
        .bg-weather-cloudy {
            background: linear-gradient(-45deg, #f5f5f5, #e0e0e0, #eeeeee);
            background-size: 300% 300%;
        }
        .bg-weather-rain {
            background: linear-gradient(180deg, #e3f2fd, #cfd8dc, #eceff1);
            background-size: 200% 200%;
        }
        .bg-weather-storm {
            background: linear-gradient(-45deg, #e1bee7, #cfd8dc, #e0e0e0);
            background-size: 300% 300%;
        }
        .bg-weather-snow {
            background: linear-gradient(-45deg, #f3e5f5, #e3f2fd, #ffffff);
            background-size: 300% 300%;
        }
        .bg-weather-roof {
            background-color: #e9ecef;
        }

        /* RIBBON CONTENT STYLING */
        .ribbon-view { padding: 12px 14px; }
        .badge-time {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .weather-emoji-line {
            font-size: 0.8rem;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: 0.2px;
        }
        .team-logo { width: 18px; height: 18px; object-fit: contain; }
        .team-abbr { font-size: 0.9rem; font-weight: 800; color: #0f172a; }
        .vs-at { font-size: 0.8rem; font-weight: 700; color: #64748b; margin: 0 2px; }
        .stadium-name {
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* FOOTER WATERMARK */
        .watermark {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
            font-weight: 800;
            color: #94a3b8;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="capture-area">
    <nav class="navbar-weather shadow-sm">
        <a href="https://weathermlb.com" class="brand-logo">
            Weather <span>MLB</span>
        </a>
        <div class="header-date">
            <div class="day" id="display-day">TODAY</div>
            <div class="full-date" id="display-date">Loading...</div>
        </div>
    </nav>

    <div class="title-banner">
        <h1>Daily MLB Weather Forecasts & Hitting Conditions</h1>
        <p>Track stadium wind speeds, rain delay risks, and live roof statuses for today's slate.</p>
    </div>

    <div id="games-grid">
        </div>
    
    <div class="watermark">WEATHERMLB.COM</div>
</div>

<script>
function getTeamAbbr(fullName) {
    const map = {
        "Arizona Diamondbacks": "ARI", "Atlanta Braves": "ATL", "Baltimore Orioles": "BAL",
        "Boston Red Sox": "BOS", "Chicago Cubs": "CHC", "Chicago White Sox": "CWS",
        "Cincinnati Reds": "CIN", "Cleveland Guardians": "CLE", "Colorado Rockies": "COL",
        "Detroit Tigers": "DET", "Houston Astros": "HOU", "Kansas City Royals": "KC",
        "Los Angeles Angels": "LAA", "Los Angeles Dodgers": "LAD", "Miami Marlins": "MIA",
        "Milwaukee Brewers": "MIL", "Minnesota Twins": "MIN", "New York Mets": "NYM",
        "New York Yankees": "NYY", "Athletics": "OAK", "Philadelphia Phillies": "PHI",
        "Pittsburgh Pirates": "PIT", "San Diego Padres": "SD", "San Francisco Giants": "SF",
        "Seattle Mariners": "SEA", "St. Louis Cardinals": "STL", "Tampa Bay Rays": "TB",
        "Texas Rangers": "TEX", "Toronto Blue Jays": "TOR", "Washington Nationals": "WSH"
    };
    return map[fullName] || (fullName ? fullName.substring(0, 3).toUpperCase() : "TBD");
}

function getWindArrow(dir) {
    if (dir === null || dir === undefined || dir === "") return "💨";
    if (!isNaN(dir) && !isNaN(parseFloat(dir))) {
        const deg = parseFloat(dir) % 360;
        if (deg >= 337.5 || deg < 22.5)  return "⬆️";
        if (deg >= 22.5  && deg < 67.5)  return "↗️";
        if (deg >= 67.5  && deg < 112.5) return "➡️";
        if (deg >= 112.5 && deg < 157.5) return "↘️";
        if (deg >= 157.5 && deg < 202.5) return "⬇️";
        if (deg >= 202.5 && deg < 247.5) return "↙️";
        if (deg >= 247.5 && deg < 292.5) return "⬅️";
        if (deg >= 292.5 && deg < 337.5) return "↖️";
    }
    const d = String(dir).toUpperCase();
    if (d.includes("NNE") || d.includes("NE") || d.includes("ENE")) return "↗️";
    if (d.includes("NNW") || d.includes("NW") || d.includes("WNW")) return "↖️";
    if (d.includes("SSE") || d.includes("SE") || d.includes("ESE")) return "↘️";
    if (d.includes("SSW") || d.includes("SW") || d.includes("WSW")) return "↙️";
    if (d === "N") return "⬆️"; if (d === "S") return "⬇️";
    if (d === "E") return "➡️"; if (d === "W") return "⬅️";
    return "💨";
}

function getWeatherEmojiString(g) {
    const w = g.weather || {};
    let arrow = getWindArrow(w.windDir || w.windDirection);

    const isRoofClosed = g.roof || (w.condition && (w.condition.toLowerCase().includes("roof closed") || w.condition.toLowerCase().includes("dome")));
    const rain = isRoofClosed ? 0 : Math.round(Number(w.maxPrecipChance !== undefined ? w.maxPrecipChance : w.pop) || 0);
    const temp = Math.round(Number(w.temp) || 0);
    const hum = Math.round(Number(w.humidity) || 0);
    const windSpd = isRoofClosed ? 0 : Math.round(Number(w.windSpeed) || 0);

    if (w.status === "too_early" || w.temp === '--' || w.temp === undefined) {
        return `Forecast Unavailable`;
    } else if (isRoofClosed) {
        return `Roof Closed 🌡️${temp}° 💧${hum}%`;
    }
    return `🌧️${rain}% 🌡️${temp}° 💧${hum}% ${arrow}${windSpd}mph`;
}

async function initBotCapture() {
    const now = new Date();
    
    // 🛡️ FORCE TIMEZONE: Ensure the header always reads as US Eastern Time
    document.getElementById('display-day').innerText = now.toLocaleDateString('en-US', { timeZone: 'America/New_York', weekday: 'long' }).toUpperCase();
    document.getElementById('display-date').innerText = now.toLocaleDateString('en-US', { timeZone: 'America/New_York', month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();

    // 🛡️ FORCE TIMEZONE: Ensure it fetches today's JSON based on EST, not UTC
    const todayStr = now.toLocaleDateString('en-CA', { timeZone: 'America/New_York' });

    try {
        const res = await fetch(`/data/daily_files/games_${todayStr}.json?v=${now.getTime()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}: Could not find games_${todayStr}.json`);
        
        const data = await res.json();
        const games = Array.isArray(data) ? data : (data.games || []);

        if (games.length === 0) {
            document.getElementById('games-grid').innerHTML = `<h3 style="color: #ffb300; grid-column: span 3; text-align: center; padding: 40px 0;">No games found in games_${todayStr}.json</h3>`;
            return;
        }

        games.sort((a, b) => new Date(a.gameRaw.gameDate) - new Date(b.gameRaw.gameDate));
        const grid = document.getElementById('games-grid');
        let html = "";

        games.forEach(g => {
            const raw = g.gameRaw || {};
            const teams = raw.teams || {};
            
            const awayId = teams.away?.team?.id || 100;
            const homeId = teams.home?.team?.id || 100;
            const awayAbbr = getTeamAbbr(teams.away?.team?.name);
            const homeAbbr = getTeamAbbr(teams.home?.team?.name);

            // 🛡️ FORCE TIMEZONE: Render the individual game times in EST
            let gameTime = raw.gameDate ? new Date(raw.gameDate).toLocaleTimeString('en-US', {
                timeZone: 'America/New_York', 
                hour: 'numeric', 
                minute: '2-digit'
            }) : "TBD";
            
            let timeBadgeClass = "bg-light text-dark border";
            const matchState = raw.status?.detailedState || "";
            if (matchState.includes("Postponed")) { gameTime = "Postponed"; timeBadgeClass = "bg-danger text-white"; }
            else if (matchState.includes("Live") || matchState === "In Progress") { gameTime = "Live"; timeBadgeClass = "bg-success text-white"; }
            else if (matchState.includes("Delay")) { gameTime = "Delayed"; timeBadgeClass = "bg-warning text-dark"; }

            const w = g.weather || {};
            const isRoofClosed = g.roof || (w.condition && (w.condition.toLowerCase().includes("roof closed") || w.condition.toLowerCase().includes("dome")));
            const rain = Math.round(Number(w.maxPrecipChance !== undefined ? w.maxPrecipChance : w.pop) || 0);

            // 1. SITE BACKGROUND COLOR GRADIENTS
            let bgClass = "bg-weather-sunny";
            if (isRoofClosed) bgClass = "bg-weather-roof";
            else if (w.isThunderstorm) bgClass = "bg-weather-storm";
            else if (w.isSnow) bgClass = "bg-weather-snow";
            else if (rain >= 50) bgClass = "bg-weather-rain";
            else if (rain >= 20) bgClass = "bg-weather-cloudy";

            // 2. THICK RISK BORDERS (Matches site alerts)
            let borderClass = "";
            if (!isRoofClosed) {
                if (w.isThunderstorm || (w.hourly && w.hourly.filter(h => h.precipChance >= 60).length >= 3)) {
                    borderClass = "border-danger border-3";
                } else if (rain >= 30) {
                    borderClass = "border-warning border-3";
                }
            }

            const emojiLine = getWeatherEmojiString(g);

            html += `
                <div class="game-card ${bgClass} ${borderClass}">
                    <div class="ribbon-view position-relative">
                        <div class="d-flex align-items-center mb-1">
                            <span class="badge badge-time ${timeBadgeClass} flex-shrink-0">${gameTime}</span>
                            <div class="weather-emoji-line text-center flex-grow-1 ms-2">
                                ${emojiLine}
                            </div>
                        </div>
                        
                        <div class="d-flex align-items-center mt-2" style="gap: 4px;">
                            <div class="d-flex align-items-center flex-shrink-0" style="gap: 3px;">
                                <img src="https://www.mlbstatic.com/team-logos/team-cap-on-light/${awayId}.svg" class="team-logo" onerror="this.style.display='none'">
                                <span class="team-abbr">${awayAbbr}</span>
                            </div>
                            
                            <span class="vs-at">@</span>
                            
                            <div class="d-flex align-items-center flex-shrink-0" style="gap: 3px;">
                                <img src="https://www.mlbstatic.com/team-logos/team-cap-on-light/${homeId}.svg" class="team-logo" onerror="this.style.display='none'">
                                <span class="team-abbr">${homeAbbr}</span>
                            </div>

                            <div class="stadium-name flex-grow-1 ms-1">${raw.venue?.name || 'TBD'}</div>
                        </div>
                    </div>
                </div>
            `;
        });

        grid.innerHTML = html;

    } catch (err) {
        document.getElementById('games-grid').innerHTML = `<h2 style="color: #dc3545; grid-column: span 3; text-align: center; padding: 40px 0;">Error loading weather data: ${err.message}</h2>`;
    }
}

initBotCapture();
</script>
</body>
</html>
