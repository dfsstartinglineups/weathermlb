<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Bot Capture - Full Weather Card View</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* RESET & BOT-SPECIFIC SIZING */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0f1115; 
            color: #1a1e24; 
            font-family: 'Montserrat', sans-serif;
            width: 1080px; 
            min-height: 1080px;
        }
        
        /* MAIN CAPTURE WRAPPER */
        #capture-area {
            width: 1080px;
            padding: 30px;
            background: linear-gradient(135deg, #0f1115 0%, #1a1d24 100%);
            position: relative;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #00e676;
            padding-bottom: 15px;
            margin-bottom: 25px;
            color: #fff;
        }
        .header h1 {
            font-size: 38px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .header .subtitle {
            font-size: 14px;
            color: #8892a3;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .header-date { text-align: right; }
        .header-date .day { font-size: 24px; font-weight: 800; color: #00e676; }
        .header-date .full-date { font-size: 14px; color: #8892a3; font-weight: 700; }

        /* GRID LAYOUT (2 Columns for wide full-cards) */
        #games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* FULL WEATHER CARD (Recreating Screenshot) */
        .game-card {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            border: 2px solid #ced4da;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* Weather Background Tints */
        .bg-weather-sunny  { background-color: #fffaf0; border-color: #ffe066; }
        .bg-weather-cloudy { background-color: #f8f9fa; border-color: #ced4da; }
        .bg-weather-rain   { background-color: #e3f2fd; border-color: #90caf9; }
        .bg-weather-storm  { background-color: #ffebee; border-color: #ef9a9a; }
        .bg-weather-snow   { background-color: #f3e5f5; border-color: #ce93d8; }
        .bg-weather-roof   { background-color: #e9ecef; border-color: #adb5bd; }

        /* Top Row: Time & Stadium */
        .card-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 700;
        }
        .badge-time {
            background: #f1f3f5;
            color: #212529;
            border: 1px solid #dee2e6;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
        }
        .badge-total {
            background: #e2e8f0;
            color: #334155;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            margin-left: 6px;
        }
        .stadium-name {
            color: #495057;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        /* Matchup Row: Logos & Names */
        .matchup-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
        }
        .team-block {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 44%;
        }
        .team-block.right { justify-content: flex-end; }
        .team-logo { width: 22px; height: 22px; object-fit: contain; }
        .team-abbr { font-size: 18px; font-weight: 800; color: #111; }
        .vs-symbol { font-size: 14px; font-weight: 700; color: #888; }

        /* Pitcher Row */
        .pitcher-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #6c757d;
            font-weight: 600;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding-bottom: 8px;
        }
        .ml-badge {
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            color: #333;
            background: rgba(0,0,0,0.06);
            padding: 1px 5px;
            border-radius: 4px;
            margin-left: 4px;
        }

        /* 4-Column Weather Row */
        .weather-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            text-align: center;
            background: rgba(255,255,255,0.6);
            border-radius: 8px;
            padding: 8px 4px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .w-col { border-right: 1px solid rgba(0,0,0,0.1); }
        .w-col:last-child { border-right: none; }
        .w-val { font-size: 15px; font-weight: 800; color: #111; line-height: 1.1; }
        .w-val.rain { color: #0288d1; }
        .w-lbl { font-size: 10px; text-transform: uppercase; color: #6c757d; font-weight: 700; margin-top: 2px; }
        
        /* Wind Badge */
        .wind-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            margin-top: 2px;
        }
        .wind-low  { background-color: #2e7d32; }
        .wind-med  { background-color: #f57f17; }
        .wind-high { background-color: #c62828; }

        /* Hourly Scroll Strip */
        .hourly-strip {
            display: flex;
            gap: 6px;
            overflow: hidden;
            padding: 4px 0;
        }
        .hour-card {
            flex: 1;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 6px;
            padding: 4px 2px;
            text-align: center;
            font-size: 10px;
            min-width: 45px;
        }
        .hour-time { font-weight: 700; color: #495057; font-size: 9px; }
        .hour-icon { font-size: 14px; margin: 2px 0; }
        .hour-pop  { color: #0288d1; font-weight: 800; font-size: 9px; }
        .hour-temp { font-weight: 700; color: #212529; }

        /* Radar Button */
        .btn-radar {
            width: 100%;
            padding: 6px;
            background: transparent;
            border: 1px solid #0d6efd;
            color: #0d6efd;
            font-size: 11px;
            font-weight: 700;
            border-radius: 6px;
            text-align: center;
        }

        /* Analysis Box */
        .analysis-box {
            background: rgba(255,255,255,0.8);
            border-left: 3px solid #0d6efd;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 11px;
            color: #333;
            line-height: 1.3;
        }
        .analysis-title { font-weight: 800; color: #0d6efd; display: block; margin-bottom: 2px; text-transform: uppercase; font-size: 10px; }

        /* WATERMARK */
        .watermark {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            font-weight: 700;
            color: #555;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="header">
        <div>
            <h1>MLB Weather Report</h1>
            <div class="subtitle">Full Game Cards & Impact Analysis</div>
        </div>
        <div class="header-date">
            <div class="day" id="display-day">TODAY</div>
            <div class="full-date" id="display-date">Loading...</div>
        </div>
    </div>

    <div id="games-grid">
        </div>
    
    <div class="watermark">WEATHERMLB.COM | @MLBSTARTINGNINE</div>
</div>

<script>
function getTeamAbbr(fullName) {
    const map = {
        "Arizona Diamondbacks": "ARI", "Atlanta Braves": "ATL", "Baltimore Orioles": "BAL",
        "Boston Red Sox": "BOS", "Chicago Cubs": "CHC", "Chicago White Sox": "CWS",
        "Cincinnati Reds": "CIN", "Cleveland Guardians": "CLE", "Colorado Rockies": "COL",
        "Detroit Tigers": "DET", "Houston Astros": "HOU", "Kansas City Royals": "KC",
        "Los Angeles Angels": "LAA", "Los Angeles Dodgers": "LAD", "Miami Marlins": "MIA",
        "Milwaukee Brewers": "MIL", "Minnesota Twins": "MIN", "New York Mets": "NYM",
        "New York Yankees": "NYY", "Athletics": "OAK", "Philadelphia Phillies": "PHI",
        "Pittsburgh Pirates": "PIT", "San Diego Padres": "SD", "San Francisco Giants": "SF",
        "Seattle Mariners": "SEA", "St. Louis Cardinals": "STL", "Tampa Bay Rays": "TB",
        "Texas Rangers": "TEX", "Toronto Blue Jays": "TOR", "Washington Nationals": "WSH"
    };
    return map[fullName] || (fullName ? fullName.substring(0, 3).toUpperCase() : "TBD");
}

function getWindArrow(dir) {
    if (dir === null || dir === undefined || dir === "") return "💨";
    if (!isNaN(dir) && !isNaN(parseFloat(dir))) {
        const deg = parseFloat(dir) % 360;
        if (deg >= 337.5 || deg < 22.5)  return "⬆️";
        if (deg >= 22.5  && deg < 67.5)  return "↗️";
        if (deg >= 67.5  && deg < 112.5) return "➡️";
        if (deg >= 112.5 && deg < 157.5) return "↘️";
        if (deg >= 157.5 && deg < 202.5) return "⬇️";
        if (deg >= 202.5 && deg < 247.5) return "↙️";
        if (deg >= 247.5 && deg < 292.5) return "⬅️";
        if (deg >= 292.5 && deg < 337.5) return "↖️";
    }
    const d = String(dir).toUpperCase();
    if (d.includes("NNE") || d.includes("NE") || d.includes("ENE")) return "↗️";
    if (d.includes("NNW") || d.includes("NW") || d.includes("WNW")) return "↖️";
    if (d.includes("SSE") || d.includes("SE") || d.includes("ESE")) return "↘️";
    if (d.includes("SSW") || d.includes("SW") || d.includes("WSW")) return "↙️";
    if (d === "N") return "⬆️"; if (d === "S") return "⬇️";
    if (d === "E") return "➡️"; if (d === "W") return "⬅️";
    return "💨";
}

function generateMatchupAnalysis(weather, windSpd, isRoofClosed, stadiumName) {
    if (isRoofClosed) return "✅ <b>Roof Closed:</b> Controlled indoor stadium with zero weather impact.";
    let notes = [];
    if (weather.isThunderstorm) notes.push("⚡ <b>Lightning Risk:</b> Thunderstorms detected. Delay risk high.");
    if (weather.isSnow) notes.push("❄️ <b>Snow Risk:</b> Low visibility and cold conditions.");
    
    const rain = Math.round(Number(weather.maxPrecipChance !== undefined ? weather.maxPrecipChance : weather.pop) || 0);
    if (rain >= 70) notes.push("☔ <b>Severe Delay Risk:</b> Heavy rain expected. Delays or postponement likely.");
    else if (rain >= 30) notes.push("☔ <b>Delay Risk:</b> Scattered showers could interrupt play.");
    
    if (windSpd >= 15) notes.push(`💨 <b>High Wind:</b> Strong ${windSpd}mph winds will heavily impact ball flight.`);
    else if (windSpd >= 10) notes.push(`💨 <b>Breezy:</b> Moderate ${windSpd}mph winds affecting outfield carry.`);
    
    if (notes.length === 0) notes.push("☀️ <b>Favorable Conditions:</b> Minimal weather impact expected for this matchup.");
    return notes.join("<br>");
}

async function initBotCapture() {
    const now = new Date();
    document.getElementById('display-day').innerText = now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
    document.getElementById('display-date').innerText = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();

    const todayStr = now.toLocaleDateString('en-CA');

    try {
        const res = await fetch(`/data/daily_files/games_${todayStr}.json?v=${now.getTime()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}: Could not find games_${todayStr}.json`);
        
        const data = await res.json();
        const games = Array.isArray(data) ? data : (data.games || []);

        if (games.length === 0) {
            document.getElementById('games-grid').innerHTML = `<h3 style="color: #ffb300; grid-column: span 2; text-align: center;">No games found in games_${todayStr}.json</h3>`;
            return;
        }

        games.sort((a, b) => new Date(a.gameRaw.gameDate) - new Date(b.gameRaw.gameDate));
        const grid = document.getElementById('games-grid');
        let html = "";

        games.forEach(g => {
            const raw = g.gameRaw || {};
            const teams = raw.teams || {};
            
            const awayId = teams.away?.team?.id || 100;
            const homeId = teams.home?.team?.id || 100;
            const awayAbbr = getTeamAbbr(teams.away?.team?.name);
            const homeAbbr = getTeamAbbr(teams.home?.team?.name);
            
            const awayP = teams.away?.probablePitcher ? teams.away.probablePitcher.fullName.split(' ').pop() : "TBD";
            const homeP = teams.home?.probablePitcher ? teams.home.probablePitcher.fullName.split(' ').pop() : "TBD";

            let gameTime = raw.gameDate ? new Date(raw.gameDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "TBD";
            const matchState = raw.status?.detailedState || "";
            if (matchState.includes("Postponed")) gameTime = "Postponed";
            else if (matchState.includes("Live") || matchState === "In Progress") gameTime = "Live";

            const w = g.weather || {};
            const isRoofClosed = g.roof || (w.condition && (w.condition.toLowerCase().includes("roof closed") || w.condition.toLowerCase().includes("dome")));
            
            let temp = Math.round(Number(w.temp) || 0);
            let hum = Math.round(Number(w.humidity) || 0);
            let rain = Math.round(Number(w.maxPrecipChance !== undefined ? w.maxPrecipChance : w.pop) || 0);
            let wind = Math.round(Number(w.windSpeed) || 0);
            let arrow = getWindArrow(w.windDir || w.windDirection);

            if (isRoofClosed) { rain = 0; wind = 0; arrow = "🏠"; }

            // Background Tint
            let bgClass = "bg-weather-sunny";
            if (isRoofClosed) bgClass = "bg-weather-roof";
            else if (w.isThunderstorm) bgClass = "bg-weather-storm";
            else if (w.isSnow) bgClass = "bg-weather-snow";
            else if (rain >= 50) bgClass = "bg-weather-rain";
            else if (rain >= 20) bgClass = "bg-weather-cloudy";

            // Wind Badge Color
            const windCss = wind >= 15 ? "wind-high" : (wind >= 10 ? "wind-med" : "wind-low");

            // Odds extraction
            let awayML = "-", homeML = "-", totalVal = "O/U -";
            if (g.odds?.bookmakers?.[0]?.markets) {
                const h2h = g.odds.bookmakers[0].markets.find(m => m.key === 'h2h');
                if (h2h?.outcomes) {
                    const aOut = h2h.outcomes.find(o => o.name === teams.away?.team?.name);
                    const hOut = h2h.outcomes.find(o => o.name === teams.home?.team?.name);
                    if (aOut) awayML = aOut.price > 0 ? `+${aOut.price}` : `${aOut.price}`;
                    if (hOut) homeML = hOut.price > 0 ? `+${hOut.price}` : `${hOut.price}`;
                }
                const tot = g.odds.bookmakers[0].markets.find(m => m.key === 'totals');
                if (tot?.outcomes?.[0]?.point) totalVal = `O/U ${tot.outcomes[0].point}`;
            }

            // Hourly Forecast Cards (Slice first 5 hours)
            let hourlyHtml = "";
            if (isRoofClosed) {
                hourlyHtml = `<div style="text-align:center; padding:8px; font-size:11px; color:#6c757d; font-weight:700;">Indoor Stadium Conditions</div>`;
            } else if (w.hourly && w.hourly.length > 0) {
                const cards = w.hourly.slice(0, 5).map(h => {
                    const d = h.timestamp ? new Date(h.timestamp) : new Date();
                    const timeLbl = `${d.getHours() % 12 || 12}${d.getHours() >= 12 ? 'PM' : 'AM'}`;
                    let icon = h.precipChance >= 30 ? (h.isThunderstorm ? '⛈️' : '🌧️') : (h.precipChance > 0 ? '⛅' : '☀️');
                    return `
                        <div class="hour-card">
                            <div class="hour-time">${timeLbl}</div>
                            <div class="hour-icon">${icon}</div>
                            <div class="hour-pop">${h.precipChance || 0}%</div>
                            <div class="hour-temp">${h.temp !== undefined ? h.temp + '°' : '--'}</div>
                        </div>`;
                }).join('');
                hourlyHtml = `<div class="hourly-strip">${cards}</div>`;
            }

            const analysis = generateMatchupAnalysis(w, wind, isRoofClosed, raw.venue?.name);

            html += `
                <div class="game-card ${bgClass}">
                    <div class="card-top-row">
                        <div>
                            <span class="badge-time">${gameTime}</span>
                            <span class="badge-total">${totalVal}</span>
                        </div>
                        <span class="stadium-name">${raw.venue?.name || 'Stadium'}</span>
                    </div>

                    <div class="matchup-row">
                        <div class="team-block">
                            <img src="https://www.mlbstatic.com/team-logos/team-cap-on-light/${awayId}.svg" class="team-logo" onerror="this.style.display='none'">
                            <span class="team-abbr">${awayAbbr}</span>
                        </div>
                        <span class="vs-symbol">@</span>
                        <div class="team-block right">
                            <span class="team-abbr">${homeAbbr}</span>
                            <img src="https://www.mlbstatic.com/team-logos/team-cap-on-light/${homeId}.svg" class="team-logo" onerror="this.style.display='none'">
                        </div>
                    </div>

                    <div class="pitcher-row">
                        <div>${awayP} <span class="ml-badge">${awayML}</span></div>
                        <div>${homeP} <span class="ml-badge">${homeML}</span></div>
                    </div>

                    <div class="weather-row">
                        <div class="w-col">
                            <div class="w-val">${temp}°F</div>
                            <div class="w-lbl">Temp</div>
                        </div>
                        <div class="w-col">
                            <div class="w-val">${hum}%</div>
                            <div class="w-lbl">Hum</div>
                        </div>
                        <div class="w-col">
                            <div class="w-val rain">${rain}%</div>
                            <div class="w-lbl">Rain</div>
                        </div>
                        <div class="w-col">
                            <div class="w-val" style="font-size:13px;">${wind} <span style="font-size:10px;">mph</span></div>
                            <span class="wind-badge ${windCss}">${arrow}</span>
                        </div>
                    </div>

                    ${hourlyHtml}

                    <div class="btn-radar">🗺️ View Live Radar</div>

                    <div class="analysis-box">
                        <span class="analysis-title">✨ Weather Impact</span>
                        ${analysis}
                    </div>
                </div>
            `;
        });

        grid.innerHTML = html;

    } catch (err) {
        document.getElementById('games-grid').innerHTML = `<h2 style="color: #ff1744; grid-column: span 2; text-align: center;">Error loading weather data: ${err.message}</h2>`;
    }
}

initBotCapture();
</script>
</body>
</html>
